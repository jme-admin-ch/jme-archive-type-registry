description:
  en:
    localisedName: jme-archive-type-registry
    shortDescription: Structured schema registry for JME archive data types
    longDescription: >
      JME Archive Type Registry is a structured Git repository for managing archive data schemas.
      It keeps published archive types immutable, supports Avro-based schema definitions, and enables
      generated Java bindings and build-time validation for archive data handled by the Process Archive Service.
    features:
      - Structured management of JME archive type schemas
      - Immutable published archive type definitions
      - Avro schema support with generated Java bindings
      - Build-time registry validation
